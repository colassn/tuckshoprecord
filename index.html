<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#09090b">
    <title>小賣部 POS</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#09090b', secondary: '#71717a', background: '#fafafa', surface: '#ffffff', bordercolor: '#e4e4e7', accent: '#18181b' },
                    fontFamily: { sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'] },
                    boxShadow: { 'premium': '0 2px 8px -2px rgba(0, 0, 0, 0.05), 0 1px 4px -1px rgba(0, 0, 0, 0.02)', 'premium-hover': '0 12px 24px -8px rgba(0, 0, 0, 0.08), 0 4px 12px -4px rgba(0, 0, 0, 0.04)', 'input': '0 1px 2px 0 rgba(0, 0, 0, 0.05)' }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { background-color: #fafafa; background-image: radial-gradient(#e4e4e7 1px, transparent 1px); background-size: 24px 24px; color: #09090b; margin: 0; font-family: 'Inter', sans-serif; overflow: hidden; height: 100dvh; touch-action: manipulation; }
        @keyframes slide-up { 0% { transform: translateY(12px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
        .animate-enter { animation: slide-up 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fade { 0% { opacity: 0; } 100% { opacity: 1; } }
        .animate-fade { animation: fade 0.2s ease-out forwards; }
        @keyframes drawer-up { 0% { transform: translateY(100%); } 100% { transform: translateY(0); } }
        .animate-drawer { animation: drawer-up 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes pulse-soft { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .animate-pulse-soft { animation: pulse-soft 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        .custom-scrollbar::-webkit-scrollbar { width: 0px; height: 0px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .input-premium { width: 100%; background-color: #ffffff; border: 1px solid #e4e4e7; border-radius: 12px; padding: 12px 16px; font-size: 14px; box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05); transition: all 0.2s ease; outline: none; }
        .input-premium:focus { border-color: #09090b; box-shadow: 0 0 0 2px rgba(9, 9, 11, 0.1); }
        .receipt-divider { border-top: 2px dashed #e4e4e7; margin: 16px 0; }
    </style>
</head>
<body>
    <div id="root" class="w-full h-[100dvh]"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const MY_FIREBASE_CONFIG = {
            apiKey: "AIzaSyABwRKNU_Y2myY1GYEKR3xE90qHCEZhnA0",
            authDomain: "tuckshop-ab288.firebaseapp.com",
            projectId: "tuckshop-ab288",
            storageBucket: "tuckshop-ab288.firebasestorage.app",
            messagingSenderId: "667240889456",
            appId: "1:667240889456:web:125ed460a488b7c7c808b5",
            measurementId: "G-LXJ5X359W2"
        };

        const ADMIN_EMAIL = 'chimhinhin@gmail.com';

        function App() {
            const [db, setDb] = useState(null);
            const [user, setUser] = useState(null);
            const [errorMsg, setErrorMsg] = useState('');
            const [isInitializing, setIsInitializing] = useState(true);
            
            const [transactions, setTransactions] = useState([]);
            const [categories, setCategories] = useState([]);
            const [menuItems, setMenuItems] = useState([]);
            const [quickAllowances, setQuickAllowances] = useState([]);
            
            const [activeTab, setActiveTab] = useState('journey'); 
            const [cart, setCart] = useState([]);
            const [isCartModalOpen, setIsCartModalOpen] = useState(false); 
            const [activeCategoryFilter, setActiveCategoryFilter] = useState('all');
            const [isMomAdding, setIsMomAdding] = useState(false);

            const todayStr = new Date().toLocaleDateString('zh-HK', { month: 'short', day: 'numeric', weekday: 'short' });

            // 1. 初始化
            useEffect(() => {
                const initFirebase = async () => {
                    // 自動攔截 file:// 錯誤
                    if (window.location.protocol === 'file:') {
                        setErrorMsg('Google 安全機制禁止從本地 (file://) 直接登入。請使用 VS Code 的 Live Server 打開，或上傳至伺服器。');
                        setIsInitializing(false);
                        return;
                    }

                    try {
                        if (!firebase.apps.length) firebase.initializeApp(MY_FIREBASE_CONFIG);
                        const auth = firebase.auth();
                        const firestoreDb = firebase.firestore();
                        setDb(firestoreDb);

                        auth.onAuthStateChanged(async (currentUser) => {
                            if (currentUser) {
                                setUser(currentUser);
                                if (currentUser.email === ADMIN_EMAIL) setActiveTab('overview');
                                setIsInitializing(false);
                            } else {
                                try { await auth.signInAnonymously(); } 
                                catch (err) { 
                                    console.error("匿名登入失敗:", err);
                                    setErrorMsg('驗證失敗。請確保 Firebase Auth 已啟用「匿名登入」。');
                                    setIsInitializing(false);
                                }
                            }
                        });
                    } catch (error) { 
                        console.error(error); 
                        setErrorMsg('連線資料庫失敗。');
                        setIsInitializing(false);
                    }
                };
                initFirebase();
            }, []);

            // 2. 監聽全新的乾淨根目錄資料庫
            useEffect(() => {
                if (!db || !user) return;
                
                // 【重構】：直接使用根目錄，拋棄舊有的複雜路徑
                const txRef = db.collection('transactions');
                const unsubTx = txRef.onSnapshot((snapshot) => {
                    setErrorMsg('');
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    data.sort((a, b) => b.timestamp - a.timestamp);
                    setTransactions(data);
                }, (error) => {
                    console.error("Firestore 權限錯誤:", error);
                    if (error.code === 'permission-denied') {
                        setErrorMsg('資料庫權限不足！請確實將 Firebase Rules 更新為最新版本。');
                    }
                });

                const settingsRef = db.collection('settings').doc('config');
                const unsubSettings = settingsRef.onSnapshot((docSnap) => {
                    if (docSnap.exists) {
                        const data = docSnap.data();
                        setMenuItems(data.items || []);
                        setCategories(data.categories || []);
                        setQuickAllowances(data.quickAllowances || []);
                    }
                });

                return () => { unsubTx(); unsubSettings(); };
            }, [db, user]);

            const isAdmin = user && user.email === ADMIN_EMAIL;
            
            const { totalBalance, totalExpense, totalIncome, expenseData } = useMemo(() => {
                let expense = 0, income = 0;
                const catTotals = {};
                transactions.forEach(tx => {
                    const amt = parseFloat(tx.amount) || 0;
                    if (tx.type === 'expense') { expense += amt; catTotals[tx.category] = (catTotals[tx.category] || 0) + amt; } 
                    else income += amt;
                });
                return { totalBalance: income - expense, totalExpense: expense, totalIncome: income, expenseData: catTotals };
            }, [transactions]);

            const transactionsWithBalance = useMemo(() => {
                let currentBalance = 0;
                const reversed = [...transactions].reverse(); 
                const processed = reversed.map(tx => {
                    const amt = parseFloat(tx.amount) || 0;
                    if (tx.type === 'income') currentBalance += amt; else currentBalance -= amt;
                    return { ...tx, runningBalance: currentBalance };
                });
                return processed.reverse(); 
            }, [transactions]);

            const groupedTransactions = useMemo(() => {
                const result = []; let currentDate = null; let currentGroup = null;
                transactionsWithBalance.forEach(tx => {
                    const dStr = new Date(tx.timestamp).toLocaleDateString('zh-HK', { year: 'numeric', month: 'short', day: 'numeric', weekday: 'short' });
                    if (dStr !== currentDate) {
                        if (currentGroup) result.push(currentGroup);
                        currentDate = dStr;
                        currentGroup = { date: dStr, items: [tx], endOfDayBalance: tx.runningBalance };
                    } else { currentGroup.items.push(tx); }
                });
                if (currentGroup) result.push(currentGroup);
                return result;
            }, [transactionsWithBalance]);

            const handleItemQuantityChange = (item, delta) => {
                setCart(prev => {
                    const existing = prev.find(i => i.id === item.id);
                    if (existing) {
                        const newQ = existing.quantity + delta;
                        if (newQ <= 0) return prev.filter(i => i.id !== item.id);
                        return prev.map(i => i.id === item.id ? { ...i, quantity: newQ } : i);
                    }
                    if (delta > 0) return [...prev, { ...item, quantity: 1, cartId: Date.now() }];
                    return prev;
                });
            };

            const clearCart = () => setCart([]);
            const cartTotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const cartItemCount = cart.reduce((sum, item) => sum + item.quantity, 0);

            // 全新資料庫路徑的批次寫入
            const handleCheckout = async () => {
                if (!db || !user || cart.length === 0) return;
                const batchTime = Date.now(); 
                const currentCart = [...cart]; 
                
                setCart([]); 
                setIsCartModalOpen(false); 
                setActiveTab('overview');

                try {
                    const batch = db.batch();
                    const txRef = db.collection('transactions');
                    for (const item of currentCart) {
                        for (let i = 0; i < item.quantity; i++) {
                            const docRef = txRef.doc();
                            batch.set(docRef, {
                                type: 'expense', amount: item.price, category: item.category, itemName: item.name, emoji: item.emoji || '📦',
                                timestamp: batchTime, createdBy: ADMIN_EMAIL, batchId: `batch_${batchTime}`
                            });
                        }
                    }
                    await batch.commit();
                } catch (error) { console.error("結帳失敗:", error); }
            };

            const handleAddIncome = async (amount, itemName) => {
                if (!db || !user || amount <= 0) return;
                await db.collection('transactions').add({
                    type: 'income', amount, category: 'allowance', itemName: itemName || '撥款入帳', emoji: '💰',
                    timestamp: Date.now(), createdBy: user.email || 'Anonymous'
                });
                setIsMomAdding(false);
            };

            const handleDeleteTransaction = async (id) => {
                if (!isAdmin) return;
                await db.collection('transactions').doc(id).delete();
            };

            const saveSettings = async (updates) => {
                if (db) {
                    await db.collection('settings').doc('config').set(updates, { merge: true }).catch(e => console.error(e));
                }
            };

            // ==========================================
            // 視圖：狀態處理
            // ==========================================
            if (isInitializing) {
                return <div className="flex h-screen items-center justify-center bg-background"><div className="w-8 h-8 border-4 border-primary border-t-transparent rounded-full animate-spin"></div></div>;
            }

            if (errorMsg) {
                return (
                    <div className="flex h-[100dvh] items-center justify-center p-6 bg-background">
                        <div className="w-full max-w-lg bg-red-50 border-2 border-red-200 rounded-3xl p-8 text-center shadow-lg">
                            <i className="fas fa-shield-alt text-4xl text-red-400 mb-4"></i>
                            <h2 className="text-xl font-bold text-red-700 mb-3">錯誤</h2>
                            <p className="text-sm text-red-600 font-medium leading-relaxed">{errorMsg}</p>
                        </div>
                    </div>
                );
            }

            const filteredMenu = activeCategoryFilter === 'all' ? menuItems : menuItems.filter(i => i.category === activeCategoryFilter);

            // ==========================================
            // 視圖：頂級主系統
            // ==========================================
            return (
                <div className="flex flex-col h-[100dvh] text-sm relative">
                    
                    {/* 頂部導航列 */}
                    <header className="h-[72px] bg-surface/80 backdrop-blur-lg border-b border-bordercolor px-4 md:px-6 flex justify-between items-center shrink-0 z-20 sticky top-0">
                        <div className="flex items-center gap-8">
                            <div className="flex items-center gap-3">
                                {user && user.photoURL ? (
                                    <img src={user.photoURL} alt="Avatar" className="w-8 h-8 rounded-lg shadow-md object-cover" />
                                ) : (
                                    <div className="w-8 h-8 bg-primary text-white rounded-lg flex items-center justify-center text-xs font-bold shadow-md">
                                        {isAdmin ? 'A' : 'V'}
                                    </div>
                                )}
                                <div className="hidden sm:block">
                                    <span className="font-bold text-base tracking-tight text-primary block leading-tight">{isAdmin ? '管理工作台' : '公開視角'}</span>
                                    <span className="text-[10px] text-secondary font-medium tracking-wide flex items-center gap-1.5">
                                        <span className="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse-soft"></span> 雲端同步中
                                    </span>
                                </div>
                            </div>
                            
                            <nav className="hidden md:flex items-center gap-6">
                                {isAdmin ? (
                                    <>
                                        <TopNavLink label="綜合概覽" active={activeTab === 'overview'} onClick={() => setActiveTab('overview')} />
                                        <TopNavLink label="POS 點餐" active={activeTab === 'pos'} onClick={() => setActiveTab('pos')} />
                                        <TopNavLink label="消費旅程" active={activeTab === 'journey'} onClick={() => setActiveTab('journey')} />
                                        <TopNavLink label="系統設定" active={activeTab === 'settings'} onClick={() => setActiveTab('settings')} />
                                    </>
                                ) : (
                                    <TopNavLink label="消費旅程" active={activeTab === 'journey'} onClick={() => setActiveTab('journey')} />
                                )}
                            </nav>
                        </div>

                        <div className="flex items-center gap-3 md:gap-4">
                            {!isAdmin && (
                                <button onClick={() => setIsMomAdding(true)} className="flex items-center gap-2 bg-primary text-white px-4 md:px-5 py-2 md:py-2.5 rounded-xl text-xs md:text-sm font-medium hover:bg-black transition-all shadow-premium hover:shadow-premium-hover active:scale-95">
                                    <i className="fas fa-plus"></i> <span className="hidden md:inline">撥款入帳</span>
                                </button>
                            )}
                            
                            {isAdmin ? (
                                <button onClick={() => firebase.auth().signOut()} className="w-10 h-10 flex items-center justify-center rounded-full text-secondary hover:bg-gray-100 transition-all" title="登出">
                                    <i className="fas fa-sign-out-alt"></i>
                                </button>
                            ) : (
                                <button onClick={async () => {
                                    const provider = new firebase.auth.GoogleAuthProvider();
                                    try { await firebase.auth().signInWithPopup(provider); } 
                                    catch (err) { alert("登入失敗，請確認 Firebase 已開啟 Google 登入。"); }
                                }} className="flex items-center gap-2 bg-surface border border-bordercolor text-primary px-3 md:px-4 py-2 md:py-2.5 rounded-xl text-xs md:text-sm font-bold hover:bg-gray-50 transition-all shadow-sm active:scale-95">
                                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" className="w-4 h-4" alt="G" />
                                    <span className="hidden md:inline">管理員登入</span>
                                </button>
                            )}
                        </div>
                    </header>

                    {/* 主內容區 */}
                    <main className="flex-1 relative w-full mx-auto overflow-hidden flex flex-col">
                        
                        {/* 👑 Overview */}
                        {activeTab === 'overview' && isAdmin && (
                            <div className="flex-1 overflow-y-auto custom-scrollbar px-4 md:px-8">
                                <div className="max-w-5xl mx-auto w-full pb-24 md:pb-8 animate-enter pt-6">
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
                                        <div className="md:col-span-2 bg-primary rounded-3xl p-8 md:p-10 flex flex-col justify-between shadow-premium hover:shadow-premium-hover transition-shadow relative overflow-hidden group">
                                            <div className="absolute top-0 right-0 w-[500px] h-[500px] bg-white/5 rounded-full blur-3xl -mr-32 -mt-32 pointer-events-none"></div>
                                            <div className="relative z-10 flex justify-between items-start">
                                                <div>
                                                    <div className="text-xs font-medium text-gray-400 mb-2 tracking-wider flex items-center gap-2">可用餘額 <span className="bg-white/10 text-white/80 px-2 py-0.5 rounded text-[10px]">HKD</span></div>
                                                    <div className="text-6xl md:text-7xl font-bold tracking-tighter text-white">${totalBalance.toFixed(1)}</div>
                                                </div>
                                                <div className="w-12 h-12 bg-white/10 rounded-2xl flex items-center justify-center text-white/50 border border-white/10 group-hover:bg-white/20 transition-colors"><i className="fas fa-wallet"></i></div>
                                            </div>
                                            <div className="flex gap-12 mt-16 relative z-10 border-t border-white/10 pt-6">
                                                <div><div className="text-[10px] text-gray-400 mb-1 tracking-wider font-bold">總支出</div><div className="text-xl font-semibold text-white">${totalExpense.toFixed(1)}</div></div>
                                                <div><div className="text-[10px] text-gray-400 mb-1 tracking-wider font-bold">總收入</div><div className="text-xl font-semibold text-white">${totalIncome.toFixed(1)}</div></div>
                                            </div>
                                        </div>

                                        <div className="bg-surface/80 backdrop-blur-sm rounded-3xl border border-bordercolor p-8 flex flex-col justify-center items-center shadow-premium hover:shadow-premium-hover transition-shadow">
                                            <div className="relative w-36 h-36 rounded-full mb-6 ring-4 ring-gray-50/50" style={{ background: totalExpense === 0 ? '#f4f4f5' : `conic-gradient(${generateConicGradient(expenseData, totalExpense, categories)})` }}>
                                                <div className="absolute inset-0 m-5 bg-surface rounded-full flex items-center justify-center shadow-input border border-gray-100"><i className="fas fa-chart-pie text-gray-300 text-xl"></i></div>
                                            </div>
                                            <div className="text-center w-full">
                                                <div className="font-bold text-primary text-base">消費分佈</div>
                                                {categories.length === 0 && <div className="text-[10px] text-secondary mt-2">請前往設定建立分類以啟用圖表</div>}
                                            </div>
                                        </div>
                                    </div>

                                    <div className="bg-surface/80 backdrop-blur-sm rounded-3xl border border-bordercolor overflow-hidden shadow-premium">
                                        <div className="px-8 py-6 border-b border-bordercolor flex justify-between items-center bg-white">
                                            <div className="flex items-center gap-3">
                                                <h2 className="font-bold text-primary text-base">近期紀錄</h2>
                                                <span className="bg-gray-100 text-secondary text-[10px] px-2 py-0.5 rounded-md font-bold">{transactions.length}</span>
                                            </div>
                                        </div>
                                        {transactions.length === 0 ? (
                                            <div className="flex flex-col items-center justify-center py-16 px-4">
                                                <div className="w-16 h-16 bg-gray-50 border border-bordercolor rounded-2xl flex items-center justify-center text-gray-300 mb-4 shadow-sm"><i className="fas fa-inbox text-2xl"></i></div>
                                                <div className="text-sm font-bold text-primary">暫無交易紀錄</div>
                                                <div className="text-xs text-secondary mt-1">請前往 POS 點餐新增。</div>
                                            </div>
                                        ) : (
                                            <div className="divide-y divide-gray-100/80">
                                                {transactions.slice(0, 5).map(tx => <HistoryRow key={tx.id} tx={tx} onDelete={() => handleDeleteTransaction(tx.id)} />)}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* 👑 POS */}
                        {activeTab === 'pos' && isAdmin && (
                            <div className="flex-1 flex flex-col md:flex-row h-full overflow-hidden px-4 md:px-6 gap-6 max-w-[1400px] mx-auto w-full animate-enter pb-4 md:pb-6 pt-4">
                                <div className="w-full md:w-[65%] flex flex-col h-full bg-surface/80 backdrop-blur-sm rounded-3xl border border-bordercolor shadow-premium overflow-hidden">
                                    <div className="px-6 py-4 border-b border-bordercolor flex gap-2 overflow-x-auto no-scrollbar shrink-0 bg-white">
                                        <button onClick={() => setActiveCategoryFilter('all')} className={`px-4 py-2 rounded-xl text-xs font-bold transition-all whitespace-nowrap border ${activeCategoryFilter === 'all' ? 'bg-primary text-white border-primary shadow-md' : 'bg-surface text-secondary border-bordercolor hover:border-gray-300'}`}>全部</button>
                                        {categories.map(cat => (
                                            <button key={cat.id} onClick={() => setActiveCategoryFilter(cat.id)} className={`px-4 py-2 rounded-xl text-xs font-bold transition-all whitespace-nowrap border ${activeCategoryFilter === cat.id ? 'bg-primary text-white border-primary shadow-md' : 'bg-surface text-secondary border-bordercolor hover:border-gray-300'}`}>
                                                {cat.emoji} {cat.name}
                                            </button>
                                        ))}
                                    </div>
                                    <div className="flex-1 overflow-y-auto custom-scrollbar p-6 pb-[120px] md:pb-6">
                                        {filteredMenu.length === 0 ? (
                                            <div className="h-full flex flex-col items-center justify-center">
                                                <div className="w-16 h-16 bg-gray-50 border border-bordercolor rounded-2xl flex items-center justify-center text-gray-300 mb-4 shadow-sm"><i className="fas fa-search text-xl"></i></div>
                                                <div className="text-sm font-bold text-primary">找不到商品</div>
                                                <div className="text-xs text-secondary mt-1">請於「系統設定」中新增。</div>
                                            </div>
                                        ) : (
                                            <div className="grid grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                                                {filteredMenu.map(item => {
                                                    const qty = cart.find(i => i.id === item.id)?.quantity || 0;
                                                    return (
                                                        <div key={item.id} className={`p-4 rounded-2xl border transition-all flex flex-col h-full bg-surface ${qty > 0 ? 'border-primary ring-1 ring-primary shadow-premium hover:-translate-y-1' : 'border-bordercolor hover:border-gray-300 hover:shadow-premium hover:-translate-y-1'}`}>
                                                            <div className="flex-1 flex flex-col items-center justify-center cursor-pointer mb-5" onClick={() => handleItemQuantityChange(item, 1)}>
                                                                <div className="text-4xl mb-4 transform transition-transform hover:scale-110 active:scale-95">{item.emoji}</div>
                                                                <div className="font-bold text-sm text-center text-primary line-clamp-1 w-full">{item.name}</div>
                                                                <div className="text-xs font-semibold text-secondary mt-1.5 px-2 py-0.5 bg-gray-50 rounded-md border border-gray-100">${item.price}</div>
                                                            </div>
                                                            <div className="w-full flex items-center justify-between bg-gray-50/80 rounded-xl p-1 shrink-0 border border-bordercolor">

                        <div>
                            <div className="font-bold text-primary text-sm">{tx.itemName}</div>
                            <div className="text-[11px] text-secondary mt-0.5 font-medium">{d.toLocaleDateString()} {d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div>
                        </div>
                    </div>
                    <div className="flex items-center gap-4">
                        <div className={`font-bold text-sm ${isIncome ? 'text-green-600' : 'text-primary'}`}>{isIncome?'+':'-'}${tx.amount.toFixed(1)}</div>
                        <button onClick={onDelete} className="w-8 h-8 rounded-lg text-gray-400 hover:bg-red-50 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-all flex items-center justify-center"><i className="fas fa-trash-alt text-xs"></i></button>
                    </div>
                </div>
            );
        }

        function GroupedTimelineDay({ group, isAdmin, onDelete }) {
            const dailyExpense = group.items.filter(i => i.type === 'expense').reduce((sum, i) => sum + parseFloat(i.amount), 0);
            return (
                <div className="flex gap-4 md:gap-5 animate-enter relative z-10">
                    <div className="flex flex-col items-center pt-1.5">
                        <div className="w-2.5 h-2.5 rounded-full shadow-sm ring-4 ring-background bg-primary"></div>
                    </div>
                    <div className="flex-1 pb-6">
                        <div className="flex justify-between items-end mb-3 px-1">
                            <div className="text-[11px] text-secondary font-bold tracking-wider">{group.date}</div>
                            <div className="text-[10px] text-secondary font-medium flex items-center gap-2">
                                {dailyExpense > 0 && <span>是日消費: <span className="font-bold text-primary">${dailyExpense.toFixed(1)}</span></span>}
                                <span className="bg-surface border border-bordercolor px-2 py-0.5 rounded-md text-primary font-bold shadow-sm">
                                    結餘: ${(group.endOfDayBalance || 0).toFixed(1)}
                                </span>
                            </div>
                        </div>
                        
                        <div className="bg-surface border border-bordercolor rounded-2xl shadow-input hover:shadow-premium transition-shadow overflow-hidden">
                            <div className="divide-y divide-gray-100">
                                {group.items.map(tx => {
                                    const isIncome = tx.type === 'income';
                                    return (
                                        <div key={tx.id} className="p-4 md:p-5 flex justify-between items-center bg-white hover:bg-gray-50/50 transition-colors group/item">
                                            <div className="flex items-center gap-4">
                                                <span className="text-xl w-10 h-10 bg-gray-50 border border-gray-100 rounded-xl flex items-center justify-center">{tx.emoji}</span>
                                                <span className="font-semibold text-sm text-primary">{tx.itemName}</span>
                                            </div>
                                            <div className="flex items-center gap-3">
                                                <span className={`font-black text-lg ${isIncome ? 'text-green-600' : 'text-primary'}`}>{isIncome?'+':'-'}${tx.amount.toFixed(1)}</span>
                                                {isAdmin && <button onClick={() => onDelete(tx.id)} className="w-6 h-6 rounded text-gray-400 hover:text-red-500 opacity-0 group-hover/item:opacity-100 transition-all flex items-center justify-center"><i className="fas fa-trash-alt text-[10px]"></i></button>}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function generateConicGradient(expenseData, total, categories) {
            if (total === 0) return 'transparent 0% 100%';
            let cumulativePercent = 0;
            return categories.map(cat => {
                const amount = expenseData[cat.id] || 0;
                if (amount === 0) return null;
                const start = cumulativePercent;
                const percent = (amount / total) * 100;
                cumulativePercent += percent;
                return `#09090b ${start}% ${cumulativePercent}%`;
            }).filter(Boolean).join(', ');
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
